<div id="snipcart-templates">
    
    <!-- ========================================================== -->
    <!-- MẪU 1: GIAO DIỆN CHỌN PHƯƠNG THỨC THANH TOÁN (LÚC CHECKOUT) -->
    <!-- Đưa về phương thức mặc định để giải nghẽn hoàn toàn nút đặt hàng -->
    <!-- ========================================================== -->
    <payment-methods-list>
        <div class="snipcart-payment-methods-list" style="font-family: sans-serif; padding: 10px 0;">
            <h3 class="snipcart-payment-methods-list__title" style="color: #111827; font-weight: bold; margin-bottom: 16px; font-size: 16px;">
                Chọn phương thức thanh toán:
            </h3>
            
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <!-- Lựa chọn Ví Điện Tử mặc định -->
                <label style="display: flex; align-items: center; gap: 12px; padding: 14px; border: 2px solid #059669; border-radius: 12px; cursor: pointer; background: #f0fdf4;">
                    <input type="radio" name="payment-method" checked style="accent-color: #059669;">
                    <div style="height: 32px; width: 32px; background: #059669; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 20px;">
                        💳
                    </div>
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-weight: bold; font-size: 14px; color: #111827;">Thanh toán qua Ví điện tử cá nhân</span>
                        <span style="font-size: 12px; color: #059669; font-weight: 500;">Chọn quét mã MoMo hoặc ZaloPay ở bước tiếp theo</span>
                    </div>
                </label>
            </div>
        </div>
    </payment-methods-list>

    <!-- ========================================================== -->
    <!-- MẪU 2: GIAO DIỆN XÁC NHẬN ĐƠN HÀNG THÀNH CÔNG (SAU KHI ĐẶT) -->
    <!-- Hiển thị 2 cách thanh toán linh hoạt cho người dùng lựa chọn -->
    <!-- ========================================================== -->
    <html-confirmation>
        <div class="snipcart-order-confirmation" style="font-family: sans-serif; max-width: 500px; margin: 0 auto; padding: 20px;">
            
            <div style="text-align: center; padding: 15px;">
                <div style="font-size: 40px; margin-bottom: 8px;">🎉</div>
                <h2 style="color: #059669; margin-bottom: 5px; font-weight: bold;">Đặt hàng thành công!</h2>
                <p style="margin: 5px 0; color: #4b5563;">Đơn hàng của bạn đã được ghi nhận trên hệ thống.</p>
            </div>

            <!-- Khung tương tác chọn 2 cách thanh toán -->
            <div style="background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 16px; padding: 16px; margin-top: 10px;">
                <p style="text-align: center; font-size: 13px; color: #475569; font-weight: bold; margin-top: 0; margin-bottom: 12px;">
                    👉 Vui lòng chọn 1 trong 2 cách để quét mã thanh toán:
                </p>

                <!-- Thanh Tab chuyển đổi giữa MoMo và ZaloPay -->
                <div style="display: flex; gap: 8px; margin-bottom: 16px;">
                    <button onclick="changePaymentQR('momo')" id="tab-momo" style="flex: 1; padding: 10px; border: 2px solid #a21caf; background: #a21caf; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.2s;">
                        Cách 1: Ví MoMo
                    </button>
                    <button onclick="changePaymentQR('zalopay')" id="tab-zalopay" style="flex: 1; padding: 10px; border: 2px solid #cbd5e1; background: white; color: #0284c7; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.2s;">
                        Cách 2: ZaloPay
                    </button>
                </div>

                <!-- Khu vực hiển thị nội dung mã QR động dựa theo nút bấm -->
                <div id="dynamic-qr-box" style="text-align: center; padding: 10px 0;">
                    <p style="color: #64748b; font-size: 13px;">Đang thiết lập mã giao dịch trực tuyến...</p>
                </div>
            </div>
        
            <button class="snipcart-button-primary" onclick="window.location.reload()" style="margin-top: 20px; width: 100%; padding: 14px; cursor: pointer; border-radius: 10px; font-weight: bold; border: none; background: #059669; color: white; font-size: 15px;">Hoàn thành & Tiếp tục mua sắm</button>
        </div>
    </html-confirmation>
</div>
